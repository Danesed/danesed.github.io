name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Weekly refresh so new Semantic Scholar entries show up automatically.
  # Mondays at 06:00 UTC.
  schedule:
    - cron: "0 6 * * 1"
  # "Run workflow" button in the Actions tab for on-demand rebuilds.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build
        uses: withastro/action@v3
        with:
          # Astro 6 requires Node >=22.12; the action defaults to Node 20.
          node-version: 22
        env:
          # Optional: set a Semantic Scholar API key in repo secrets to lift
          # the unauthenticated rate limit. Build still works without it.
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
